<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Klinik Syifa Pratama Sudjari</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

    <div id="header-placeholder"></div>

    <main class="login-main-wrapper">
        <div class="login-split-container">
            
            <div class="login-left-brand">
                <img src="assets/images/logo klinik lagi.png" alt="Logo Klinik Sudjari Solichin Medika" class="brand-huge-logo">
            </div>

            <div class="login-right-form">
                <div class="login-white-card">
                    
                    <h1 class="sim-title">Sistem Informasi Manajemen<br>Klinik Syifa Medika</h1>
                    <p class="sim-subtitle">Silakan login untuk masuk ke dashboard</p>

                    <form id="formLoginUtama" onsubmit="handleLogin(event)">
                        
                        <div id="error-message" style="text-align: center; font-size: 0.9rem; font-weight: 600; margin-bottom: 15px; min-height: 20px;"></div>
                        
                        <div class="login-field-group">
                            <label for="username">Username</label>
                            <input type="text" id="username" name="username" placeholder="Masukkan username" required>
                        </div>

                        <div class="login-field-group">
                            <label for="password">Password</label>
                            <input type="password" id="password" name="password" placeholder="Masukkan password" required>
                        </div>

                        <div class="forgot-link-area">
                            <a href="#" class="link-muted">Lupa password?</a>
                        </div>

                        <div class="remember-me-area">
                            <label class="checkbox-container">
                                <input type="checkbox" name="remember">
                                <span class="checkmark"></span>
                                Remember me
                            </label>
                        </div>

                        <button type="submit" class="btn-login-blue">Login</button>

                    </form>

                    <div class="back-to-web-area">
                        <a href="index.html" class="link-back-web">&lt; Kembali ke Website Pasien</a>
                    </div>

                </div>
            </div>

        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="js/component-loader.js"></script>
    
    <script src="js/auth.js"></script>
</body>
</html>
